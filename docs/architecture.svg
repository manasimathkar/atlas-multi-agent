<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 760" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b91c1c"/>
    </marker>
    <style>
      .agent { fill: #f0f9ff; stroke: #0369a1; stroke-width: 2; rx: 10; ry: 10; }
      .security { fill: #fef2f2; stroke: #b91c1c; stroke-width: 2; rx: 10; ry: 10; }
      .tool { fill: #fef9c3; stroke: #a16207; stroke-width: 2; rx: 10; ry: 10; }
      .terminal { fill: #f3f4f6; stroke: #374151; stroke-width: 2; rx: 18; ry: 18; }
      .label { font-size: 14px; font-weight: 600; fill: #111827; }
      .sublabel { font-size: 11px; fill: #4b5563; }
      .edge { stroke: #374151; stroke-width: 1.8; fill: none; }
      .edge-red { stroke: #b91c1c; stroke-width: 1.8; fill: none; stroke-dasharray: 5 3; }
      .edge-loop { stroke: #047857; stroke-width: 1.8; fill: none; stroke-dasharray: 5 3; }
      .legend-text { font-size: 12px; fill: #111827; }
      .header { font-size: 20px; font-weight: 700; fill: #111827; }
      .subheader { font-size: 12px; fill: #6b7280; }
    </style>
  </defs>

  <text x="40" y="36" class="header">Atlas — Multi-Agent Research &amp; Brief Generator</text>
  <text x="40" y="56" class="subheader">LangGraph orchestrator · 5 specialized agents · 3 security checkpoints · tool allowlisting · hard budget caps</text>

  <!-- START -->
  <rect x="40" y="100" width="120" height="44" class="terminal"/>
  <text x="100" y="127" text-anchor="middle" class="label">User query</text>

  <!-- Security input -->
  <rect x="220" y="92" width="180" height="60" class="security"/>
  <text x="310" y="116" text-anchor="middle" class="label">🛡️ Security (input)</text>
  <text x="310" y="135" text-anchor="middle" class="sublabel">regex + Haiku judge</text>

  <!-- Planner -->
  <rect x="460" y="92" width="180" height="60" class="agent"/>
  <text x="550" y="116" text-anchor="middle" class="label">🧠 Planner</text>
  <text x="550" y="135" text-anchor="middle" class="sublabel">decompose → sub-questions</text>

  <!-- Fan-out hub -->
  <circle cx="780" cy="122" r="14" fill="#fef3c7" stroke="#a16207" stroke-width="2"/>
  <text x="780" y="127" text-anchor="middle" class="sublabel" font-weight="700">fan</text>

  <!-- Researchers (parallel) -->
  <rect x="880" y="40" width="180" height="60" class="agent"/>
  <text x="970" y="64" text-anchor="middle" class="label">🔎 Researcher 1</text>
  <text x="970" y="83" text-anchor="middle" class="sublabel">Tavily search · summarize</text>

  <rect x="880" y="110" width="180" height="60" class="agent"/>
  <text x="970" y="134" text-anchor="middle" class="label">🔎 Researcher 2</text>
  <text x="970" y="153" text-anchor="middle" class="sublabel">Tavily search · summarize</text>

  <rect x="880" y="180" width="180" height="60" class="agent"/>
  <text x="970" y="204" text-anchor="middle" class="label">🔎 Researcher N</text>
  <text x="970" y="223" text-anchor="middle" class="sublabel">(parallel, ≤ 5 sub-Qs)</text>

  <!-- Tool: Tavily + content guard -->
  <rect x="880" y="270" width="180" height="86" class="tool"/>
  <text x="970" y="294" text-anchor="middle" class="label">Tavily Search</text>
  <text x="970" y="312" text-anchor="middle" class="sublabel">+ content guardrail</text>
  <text x="970" y="328" text-anchor="middle" class="sublabel">(strip HTML · scan content</text>
  <text x="970" y="344" text-anchor="middle" class="sublabel">for prompt injection)</text>

  <!-- Writer -->
  <rect x="460" y="380" width="180" height="60" class="agent"/>
  <text x="550" y="404" text-anchor="middle" class="label">✍️ Writer</text>
  <text x="550" y="423" text-anchor="middle" class="sublabel">synthesize brief + citations</text>

  <!-- Critic -->
  <rect x="220" y="380" width="180" height="60" class="agent"/>
  <text x="310" y="404" text-anchor="middle" class="label">🔍 Critic</text>
  <text x="310" y="423" text-anchor="middle" class="sublabel">fact-check vs sources</text>

  <!-- Security output -->
  <rect x="220" y="540" width="180" height="60" class="security"/>
  <text x="310" y="564" text-anchor="middle" class="label">🛡️ Security (output)</text>
  <text x="310" y="583" text-anchor="middle" class="sublabel">PII redact · policy check</text>

  <!-- END -->
  <rect x="460" y="548" width="160" height="44" class="terminal"/>
  <text x="540" y="575" text-anchor="middle" class="label">Final brief → user</text>

  <!-- Edges: main forward path -->
  <line x1="160" y1="122" x2="220" y2="122" class="edge" marker-end="url(#arrow)"/>
  <line x1="400" y1="122" x2="460" y2="122" class="edge" marker-end="url(#arrow)"/>
  <line x1="640" y1="122" x2="766" y2="122" class="edge" marker-end="url(#arrow)"/>
  <!-- fan out -->
  <line x1="794" y1="118" x2="880" y2="70" class="edge" marker-end="url(#arrow)"/>
  <line x1="794" y1="122" x2="880" y2="140" class="edge" marker-end="url(#arrow)"/>
  <line x1="794" y1="126" x2="880" y2="210" class="edge" marker-end="url(#arrow)"/>

  <!-- researchers → tool (allowlist) -->
  <line x1="970" y1="240" x2="970" y2="270" class="edge" marker-end="url(#arrow)"/>
  <text x="985" y="258" class="sublabel">allowlisted</text>

  <!-- researchers → writer (merge) -->
  <path d="M 880 70 Q 720 70 700 200 Q 680 320 640 400" class="edge" marker-end="url(#arrow)"/>
  <path d="M 880 140 Q 740 140 720 270 Q 700 350 640 400" class="edge" marker-end="url(#arrow)"/>
  <path d="M 880 210 Q 760 230 740 320 Q 720 380 640 405" class="edge" marker-end="url(#arrow)"/>

  <!-- writer → critic -->
  <line x1="460" y1="410" x2="400" y2="410" class="edge" marker-end="url(#arrow)"/>

  <!-- critic → security_output (accept) -->
  <line x1="310" y1="440" x2="310" y2="540" class="edge" marker-end="url(#arrow)"/>
  <text x="320" y="490" class="sublabel">accepted</text>

  <!-- critic → writer (retry loop) -->
  <path d="M 350 380 Q 430 320 510 380" class="edge-loop" marker-end="url(#arrow)"/>
  <text x="430" y="345" class="sublabel" fill="#047857">retry (≤ 1)</text>

  <!-- security_output → END -->
  <line x1="400" y1="570" x2="460" y2="570" class="edge" marker-end="url(#arrow)"/>

  <!-- block path from input security to END -->
  <path d="M 310 152 Q 310 250 480 555" class="edge-red" marker-end="url(#arrow-red)"/>
  <text x="240" y="240" class="sublabel" fill="#b91c1c">blocked → refusal</text>

  <!-- Legend -->
  <rect x="40" y="650" width="1020" height="90" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="55" y="670" class="label">Legend</text>

  <rect x="60" y="680" width="20" height="14" class="agent"/>
  <text x="88" y="691" class="legend-text">Agent (LLM-backed)</text>

  <rect x="240" y="680" width="20" height="14" class="security"/>
  <text x="268" y="691" class="legend-text">Security checkpoint</text>

  <rect x="440" y="680" width="20" height="14" class="tool"/>
  <text x="468" y="691" class="legend-text">Tool (allowlisted)</text>

  <line x1="620" y1="687" x2="650" y2="687" class="edge" marker-end="url(#arrow)"/>
  <text x="658" y="691" class="legend-text">Normal flow</text>

  <line x1="780" y1="687" x2="810" y2="687" class="edge-loop" marker-end="url(#arrow)"/>
  <text x="818" y="691" class="legend-text">Critic retry loop</text>

  <line x1="60" y1="717" x2="90" y2="717" class="edge-red" marker-end="url(#arrow-red)"/>
  <text x="98" y="721" class="legend-text">Blocked path (fail-closed)</text>

  <text x="290" y="721" class="legend-text">Hard caps: ≤5 sub-questions · ≤10 search calls · ≤1 critic retry · 4k tokens/agent · 120s timeout</text>
</svg>
