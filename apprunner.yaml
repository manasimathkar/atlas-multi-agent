version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install --upgrade pip
      - pip install .
run:
  runtime-version: 3.11
  command: uvicorn atlas.web.server:app --host 0.0.0.0 --port 8080 --proxy-headers --forwarded-allow-ips=*
  network:
    port: 8080
    env: PORT
  env:
    - name: PORT
      value: "8080"
